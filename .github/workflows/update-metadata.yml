name: update metadata

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  GITLAB_TOKEN: ${{secrets.GITLAB_TOKEN}}

concurrency:
  group: update-metadata-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-metadata:
    if: github.repository == 'Rabenherz112/awesome-sysadmin-data'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: make install
      - run: make update_metadata
      - name: commit and push changes
        run: |
          git config user.name awesome-sysadmin-bot
          git config user.email github-actions@github.com
          git add software/ tags/ platforms/ licenses*.yml
          git diff-index --quiet HEAD || git commit -m "[bot] update projects metadata"
          git push
  build:
    if: github.repository == 'Rabenherz112/awesome-sysadmin-data'
    needs: update-metadata
    uses: ./.github/workflows/build.yml
    secrets: inherit
